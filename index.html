<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OS Grid Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: sans-serif; }
#map { width:100vw; height:100vh; }
#info {
  position:absolute; top:10px; right:10px; z-index:1000;
  background:rgba(255,255,255,0.92); border-radius:6px;
  padding:6px 10px; font-size:11px;
  box-shadow:0 1px 4px rgba(0,0,0,0.2); line-height:1.9; max-width:240px;
}
#info strong { font-size:12px; display:block; margin-bottom:2px; }
.ref { font-weight:600; font-size:11px; }
.ref span { color:#555; font-weight:400; }
#search-box {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  z-index:1000; display:flex; gap:5px;
  background:rgba(255,255,255,0.92); border-radius:6px;
  padding:5px 7px; box-shadow:0 1px 4px rgba(0,0,0,0.2);
}
#search-box input {
  font-size:12px; padding:3px 8px; border:1px solid #ccc;
  border-radius:4px; width:220px; outline:none;
}
#search-box button {
  font-size:11px; padding:3px 9px; border:1px solid #ccc;
  border-radius:4px; background:white; cursor:pointer;
}
#switcher {
  position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
  z-index:1000; background:rgba(255,255,255,0.92); border-radius:6px;
  padding:5px 7px; box-shadow:0 1px 4px rgba(0,0,0,0.2);
  display:flex; flex-wrap:wrap; gap:5px; align-items:center;
  justify-content:center; max-width:600px;
}
#switcher button, #switcher select {
  font-size:11px; padding:3px 9px; border:1px solid #ccc;
  border-radius:4px; background:white; cursor:pointer; white-space:nowrap;
}
#switcher button.active { background:#1a56db; color:white; border-color:#1a56db; }
#savebtn { border-color:#2a7a2a !important; color:#2a7a2a !important; }
#status { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:2000; background:rgba(0,0,0,0.7); color:white; padding:12px 20px;
  border-radius:8px; font-size:13px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="search-box">
  <input type="text" id="search-input" placeholder="Search address or place..." onkeydown="if(event.key==='Enter')doSearch()"/>
  <button onclick="doSearch()">Go</button>
</div>
<div id="info">
  <strong>OS Grid Map</strong>
  <span id="grid-size-label">Grid: 5m × 5m</span><br>
  <div class="ref">OS: <span id="ref-os">—</span></div>
  <div class="ref">MGRS: <span id="ref-mgrs">—</span></div>
  <div class="ref">Lat/Lng: <span id="ref-latlng">—</span></div>
  <div class="ref">W3W: <span id="ref-w3w">—</span></div>
</div>
<div id="switcher">
  <button class="active" onclick="setLayer('streets')">Streets</button>
  <button onclick="setLayer('satellite')">Satellite</button>
  <button onclick="setLayer('hybrid')">Hybrid</button>
  <button onclick="setLayer('outdoors')">Outdoors</button>
  <button onclick="setLayer('navday')">Nav Day</button>
  <button onclick="setLayer('navnight')">Nav Night</button>
  <span style="width:1px;background:#ccc;height:18px;display:inline-block;"></span>
  <select id="grid-select" onchange="setGridSize(parseInt(this.value))">
    <option value="5">Grid: 5m</option>
    <option value="10">Grid: 10m</option>
    <option value="20">Grid: 20m</option>
    <option value="50">Grid: 50m</option>
    <option value="100">Grid: 100m</option>
  </select>
  <span style="width:1px;background:#ccc;height:18px;display:inline-block;"></span>
  <button id="savebtn" onclick="saveA4()">Save A4</button>
</div>
<div id="status">Capturing map...</div>
<script>
var MB = 'pk.eyJ1IjoiYXJkZW5yb2NrcyIsImEiOiJjbXB2c2FsYzkxb2hvMnNzZXNzeGxjazJ0In0.7w2FKRbgmRHs21GCXDe83Q';
var mb = 'https://api.mapbox.com/styles/v1/mapbox/';
var t  = '/tiles/256/{z}/{x}/{y}@2x?access_token=' + MB;
var attr = '© Mapbox © OpenStreetMap';

// ── OS National Grid conversion (pure JS, no dependencies) ──────────────────
// Based on OS formulas, WGS84 → OSGB36 → easting/northing → grid ref string
function wgs84ToOSGB36(lat, lon) {
  // WGS84 to OSGB36 Helmert transform
  var a = 6378137.000, b = 6356752.3141;
  var e2 = 1 - (b*b)/(a*a);
  var nu = a / Math.sqrt(1 - e2*Math.sin(lat*Math.PI/180)*Math.sin(lat*Math.PI/180));
  var x = nu * Math.cos(lat*Math.PI/180) * Math.cos(lon*Math.PI/180);
  var y = nu * Math.cos(lat*Math.PI/180) * Math.sin(lon*Math.PI/180);
  var z = (1-e2)*nu * Math.sin(lat*Math.PI/180);
  // Helmert params WGS84→OSGB36
  var tx=-446.448, ty=125.157, tz=-542.060;
  var rx=-0.1502/3600*Math.PI/180, ry=-0.2470/3600*Math.PI/180, rz=-0.8421/3600*Math.PI/180;
  var s=20.4894/1e6;
  var x2=(1+s)*(x + rz*y - ry*z) + tx;
  var y2=(1+s)*(-rz*x + y + rx*z) + ty;
  var z2=(1+s)*(ry*x - rx*y + z) + tz;
  // Cartesian to geodetic (Airy 1830)
  var aA=6377563.396, bA=6356256.910, e2A=1-(bA*bA)/(aA*aA);
  var p=Math.sqrt(x2*x2+y2*y2), phi=Math.atan2(z2,p*(1-e2A)), phiP;
  do {
    phiP=phi;
    var nuA=aA/Math.sqrt(1-e2A*Math.sin(phiP)*Math.sin(phiP));
    phi=Math.atan2(z2+e2A*nuA*Math.sin(phiP),p);
  } while(Math.abs(phi-phiP)>1e-12);
  return { lat: phi*180/Math.PI, lon: Math.atan2(y2,x2)*180/Math.PI };
}

function latLonToEN(lat, lon) {
  var a=6377563.396, b=6356256.910;
  var F0=0.9996012717, lat0=49*Math.PI/180, lon0=-2*Math.PI/180;
  var N0=-100000, E0=400000;
  var e2=1-b*b/(a*a), n=(a-b)/(a+b);
  var phi=lat*Math.PI/180, lam=lon*Math.PI/180;
  var nu=a*F0/Math.sqrt(1-e2*Math.sin(phi)*Math.sin(phi));
  var rho=a*F0*(1-e2)/Math.pow(1-e2*Math.sin(phi)*Math.sin(phi),1.5);
  var eta2=nu/rho-1;
  var M=b*F0*(
    (1+n+5/4*n*n+5/4*n*n*n)*(phi-lat0)
    -(3*n+3*n*n+21/8*n*n*n)*Math.sin(phi-lat0)*Math.cos(phi+lat0)
    +(15/8*n*n+15/8*n*n*n)*Math.sin(2*(phi-lat0))*Math.cos(2*(phi+lat0))
    -(35/24*n*n*n)*Math.sin(3*(phi-lat0))*Math.cos(3*(phi+lat0))
  );
  var I=M+N0, II=nu/2*Math.sin(phi)*Math.cos(phi);
  var III=nu/24*Math.sin(phi)*Math.pow(Math.cos(phi),3)*(5-Math.tan(phi)*Math.tan(phi)+9*eta2);
  var IIIA=nu/720*Math.sin(phi)*Math.pow(Math.cos(phi),5)*(61-58*Math.tan(phi)*Math.tan(phi)+Math.pow(Math.tan(phi),4));
  var IV=nu*Math.cos(phi);
  var V=nu/6*Math.pow(Math.cos(phi),3)*(nu/rho-Math.tan(phi)*Math.tan(phi));
  var VI=nu/120*Math.pow(Math.cos(phi),5)*(5-18*Math.tan(phi)*Math.tan(phi)+Math.pow(Math.tan(phi),4)+14*eta2-58*Math.tan(phi)*Math.tan(phi)*eta2);
  var dl=lam-lon0;
  var N=I+II*dl*dl+III*dl*dl*dl*dl+IIIA*dl*dl*dl*dl*dl*dl;
  var E=E0+IV*dl+V*dl*dl*dl+VI*dl*dl*dl*dl*dl;
  return { E: Math.round(E), N: Math.round(N) };
}

function enToGridRef(E, N) {
  var letters='ABCDEFGHJKLMNOPQRSTUVWXYZ';
  var e100=Math.floor(E/100000), n100=Math.floor(N/100000);
  var l1=Math.floor((19-n100)/5)*5+Math.floor(e100/5);
  var l2=(19-n100)*5%25+e100%5;
  // adjust for I
  if(l1>=8) l1++; if(l2>=8) l2++;
  var eR=E%100000, nR=N%100000;
  var eStr=String(eR).padStart(5,'0'), nStr=String(nR).padStart(5,'0');
  return letters[l1]+letters[l2]+' '+eStr.slice(0,4)+' '+nStr.slice(0,4);
}

function latLngToOSRef(lat, lng) {
  try {
    var osgb = wgs84ToOSGB36(lat, lng);
    var en = latLonToEN(osgb.lat, osgb.lon);
    return enToGridRef(en.E, en.N);
  } catch(e) { return null; }
}

// ── MGRS conversion (pure JS) ───────────────────────────────────────────────
function latLngToMGRS(lat, lng) {
  try {
    // WGS84 → UTM
    var a=6378137, f=1/298.257223563, b=a*(1-f);
    var e2=1-b*b/(a*a), e=Math.sqrt(e2), ep2=e2/(1-e2);
    var k0=0.9996;
    var phi=lat*Math.PI/180, lam=lng*Math.PI/180;
    var zone=Math.floor((lng+180)/6)+1;
    var lam0=((zone-1)*6-180+3)*Math.PI/180;
    var N=a/Math.sqrt(1-e2*Math.sin(phi)*Math.sin(phi));
    var T=Math.tan(phi)*Math.tan(phi), C=ep2*Math.cos(phi)*Math.cos(phi);
    var A=Math.cos(phi)*(lam-lam0);
    var M=a*((1-e2/4-3*e2*e2/64-5*e2*e2*e2/256)*phi
      -(3*e2/8+3*e2*e2/32+45*e2*e2*e2/1024)*Math.sin(2*phi)
      +(15*e2*e2/256+45*e2*e2*e2/1024)*Math.sin(4*phi)
      -(35*e2*e2*e2/3072)*Math.sin(6*phi));
    var x=k0*N*(A+(1-T+C)*A*A*A/6+(5-18*T+T*T+72*C-58*ep2)*A*A*A*A*A/120)+500000;
    var y=k0*(M+N*Math.tan(phi)*(A*A/2+(5-T+9*C+4*C*C)*A*A*A*A/24+(61-58*T+T*T+600*C-330*ep2)*A*A*A*A*A*A/720));
    if(lat<0) y+=10000000;
    // UTM → MGRS band
    var bands='CDEFGHJKLMNPQRSTUVWX';
    var latBand=bands[Math.floor((lat+80)/8)];
    // Column letters per zone
    var colLetters=['ABCDEFGH','JKLMNPQR','STUVWXYZ'];
    var col=colLetters[(zone-1)%3][Math.floor(x/100000)-1];
    // Row letters
    var rowLetters='ABCDEFGHJKLMNPQRSTUV';
    var row=rowLetters[Math.floor(y/100000)%20];
    var eStr=String(Math.floor(x%100000)).padStart(5,'0');
    var nStr=String(Math.floor(y%100000)).padStart(5,'0');
    return zone+latBand+' '+col+row+' '+eStr.slice(0,4)+' '+nStr.slice(0,4);
  } catch(e) { return null; }
}

function isInGB(lat, lng) {
  return lat>=49.5 && lat<=61.5 && lng>=-8.5 && lng<=2.5;
}

// ── Map setup ───────────────────────────────────────────────────────────────
var boundary = [
  [53.7869272,-2.8603904],[53.7866666,-2.8572281],
  [53.7864614,-2.8573588],[53.7863697,-2.8574978],
  [53.7862900,-2.8577756],[53.7859424,-2.8602719]
];

var map = L.map('map').setView([53.7864,-2.8588], 18);

var mapLayers = {
  streets:  L.tileLayer(mb+'streets-v12'+t,           {attribution:attr,maxZoom:22}),
  satellite:L.tileLayer(mb+'satellite-v9'+t,          {attribution:attr,maxZoom:22}),
  hybrid:   L.tileLayer(mb+'satellite-streets-v12'+t, {attribution:attr,maxZoom:22}),
  outdoors: L.tileLayer(mb+'outdoors-v12'+t,          {attribution:attr,maxZoom:22}),
  navday:   L.tileLayer(mb+'navigation-day-v1'+t,     {attribution:attr,maxZoom:22}),
  navnight: L.tileLayer(mb+'navigation-night-v1'+t,   {attribution:attr,maxZoom:22})
};
var current = mapLayers.streets;
current.addTo(map);

function setLayer(name) {
  map.removeLayer(current);
  current = mapLayers[name];
  current.addTo(map);
  current.bringToBack();
  document.querySelectorAll('#switcher button:not(#savebtn)').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'"+name+"'")>-1);
  });
}

function doSearch() {
  var q = document.getElementById('search-input').value.trim();
  if (!q) return;
  fetch('https://api.mapbox.com/geocoding/v5/mapbox.places/'+encodeURIComponent(q)+'.json?access_token='+MB+'&limit=1')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.features&&d.features.length>0){ var c=d.features[0].center; map.setView([c[1],c[0]],17); }
      else alert('Location not found');
    });
}

L.polygon(boundary,{color:'#ff3300',weight:3,fill:false}).addTo(map);

// ── Grid canvas ─────────────────────────────────────────────────────────────
var gridSize = 5;
var gridCanvas = document.createElement('canvas');
gridCanvas.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:400;';
document.getElementById('map').appendChild(gridCanvas);

function metersToLat(m)      { return m/111320; }
function metersToLng(m,lat)  { return m/(111320*Math.cos(lat*Math.PI/180)); }

function drawGrid() {
  var w=map.getSize().x, h=map.getSize().y;
  gridCanvas.width=w; gridCanvas.height=h;
  var ctx=gridCanvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  var center=map.getCenter();
  var gsLat=metersToLat(gridSize), gsLng=metersToLng(gridSize,center.lat);
  var bounds=map.getBounds();
  var startLat=Math.floor(bounds.getSouth()/gsLat)*gsLat;
  var startLng=Math.floor(bounds.getWest()/gsLng)*gsLng;
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=0.8;
  for(var lat=startLat;lat<=bounds.getNorth()+gsLat;lat+=gsLat){
    var p1=map.latLngToContainerPoint([lat,bounds.getWest()]);
    var p2=map.latLngToContainerPoint([lat,bounds.getEast()]);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
  }
  for(var lng=startLng;lng<=bounds.getEast()+gsLng;lng+=gsLng){
    var p1=map.latLngToContainerPoint([bounds.getNorth(),lng]);
    var p2=map.latLngToContainerPoint([bounds.getSouth(),lng]);
    ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
  }
  ctx.font='bold 9px sans-serif'; ctx.textBaseline='middle';
  var colIdx=1;
  for(var lng=startLng;lng<=bounds.getEast();lng+=gsLng){
    var p=map.latLngToContainerPoint([bounds.getNorth(),lng+gsLng/2]);
    if(p.x>0&&p.x<w){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(p.x-10,4,20,14);
      ctx.fillStyle='rgba(255,255,255,0.9)';ctx.textAlign='center';ctx.fillText(colIdx,p.x,11);
    }
    colIdx++;
  }
  var rowIdx=1;
  for(var lat=startLat+gsLat;lat<=bounds.getNorth()+gsLat;lat+=gsLat){
    var p=map.latLngToContainerPoint([lat-gsLat/2,bounds.getWest()]);
    if(p.y>0&&p.y<h){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(4,p.y-7,20,14);
      ctx.fillStyle='rgba(255,255,255,0.9)';ctx.textAlign='center';ctx.fillText(rowIdx,14,p.y);
    }
    rowIdx++;
  }
}

function setGridSize(m) {
  gridSize=m;
  document.getElementById('grid-size-label').textContent='Grid: '+m+'m × '+m+'m';
  drawGrid();
}

map.on('move',drawGrid);map.on('moveend',drawGrid);
map.on('zoom',drawGrid);map.on('zoomend',drawGrid);map.on('resize',drawGrid);
drawGrid();

// ── Hover refs ──────────────────────────────────────────────────────────────
var w3wTimer=null, w3wCache={};
function fetchW3W(lat,lng){
  var key=lat.toFixed(4)+','+lng.toFixed(4);
  if(w3wCache[key]){document.getElementById('ref-w3w').textContent=w3wCache[key];return;}
  clearTimeout(w3wTimer);
  w3wTimer=setTimeout(function(){
    fetch('https://api.what3words.com/v3/convert-to-3wa?coordinates='+lat+','+lng,{headers:{'X-Api-Key':'0U2L1WED'}})
      .then(function(r){return r.json();})
      .then(function(d){
        var v=d.words?'///'+d.words:'need W3W key';
        w3wCache[key]=v; document.getElementById('ref-w3w').textContent=v;
      }).catch(function(){document.getElementById('ref-w3w').textContent='need W3W key';});
  },400);
}

map.on('mousemove',function(e){
  var lat=e.latlng.lat, lng=e.latlng.lng;
  document.getElementById('ref-latlng').textContent=lat.toFixed(6)+', '+lng.toFixed(6);
  document.getElementById('ref-os').textContent=isInGB(lat,lng)?(latLngToOSRef(lat,lng)||'—'):'Outside GB';
  document.getElementById('ref-mgrs').textContent=latLngToMGRS(lat,lng)||'—';
  fetchW3W(lat,lng);
});

function saveA4(){
  var ids=['info','switcher','search-box'];
  ids.forEach(function(id){document.getElementById(id).style.display='none';});
  document.getElementById('status').style.display='block';
  html2canvas(document.getElementById('map'),{useCORS:true,allowTaint:true,scale:1}).then(function(canvas){
    var a4w=1754,a4h=1240,out=document.createElement('canvas');
    out.width=a4w;out.height=a4h;
    var ctx=out.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,a4w,a4h);
    var scale=Math.min(a4w/canvas.width,a4h/canvas.height);
    ctx.drawImage(canvas,(a4w-canvas.width*scale)/2,(a4h-canvas.height*scale)/2,canvas.width*scale,canvas.height*scale);
    var link=document.createElement('a');
    link.download='os_grid_map_a4.png';link.href=out.toDataURL('image/png');link.click();
    document.getElementById('status').style.display='none';
    ids.forEach(function(id){document.getElementById(id).style.display='';});
  });
}
</script>
</body>
</html>
